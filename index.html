<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC HGF - Đội Bóng Gia Đình</title>
    <style>
        /* Dán toàn bộ nội dung layout.css của bạn vào đây */
        body { background-color: #f8f9fa; font-family: Arial, sans-serif; margin: 0; }
        .top-banner img { width: 100%; height: auto; display: block; }
        .main-heading { background-color: #eda4e2; padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; }
        
        /* Menu Style */
        .side-menu { position: fixed; top: 0; left: -250px; width: 250px; height: 100%; background: #fff; z-index: 1000; transition: 0.3s; box-shadow: 2px 0 10px rgba(0,0,0,0.2); padding: 20px; }
        .side-menu.active { left: 0; }
        .menu-icon { cursor: pointer; display: flex; flex-direction: column; gap: 5px; width: 35px; }
        .menu-icon span { height: 5px; background: #000; border-radius: 3px; }
        .menu-list { list-style: none; padding: 0; }
        .menu-list li { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; font-weight: bold; }
        
        /* Album & Grid */
        .content-area { padding: 20px; max-width: 1200px; margin: auto; }
        .album-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .album-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer; }
        .album-preview { width: 100%; height: 200px; object-fit: cover; }
        
        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; overflow-y: auto; }
        .modal-content { background: white; margin: 5% auto; padding: 20px; width: 90%; max-width: 800px; border-radius: 10px; }
        #photoViewer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; justify-content: center; align-items: center; }
        #photoViewer img { max-width: 90%; max-height: 90%; border: 2px solid white; }
    </style>
</head>
<body>

    <div id="sideMenu" class="side-menu">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3>DANH MỤC</h3>
            <span onclick="toggleMenu()" style="font-size:30px; cursor:pointer;">&times;</span>
        </div>
        <ul class="menu-list">
            <li onclick="goBackHome()">🏠 Trang Chủ</li>
            <li onclick="showTab('thanh-vien')">⚽ Thành Viên</li>
            <li>👕 Áo Đấu</li>
        </ul>
    </div>

    <div class="top-banner"><img src="https://lh3.googleusercontent.com/d/1Xy_JkXv_E_y_z_y_z_y_z_y_z_y_z_y_z=s1600" alt="Banner"></div>
    <div class="main-heading">
        <div class="menu-icon" onclick="toggleMenu()"><span></span><span></span><span></span></div>
        <div style="text-align:center; flex:1;">
            <h1 style="margin:0; font-size:24px;">FC.HGF</h1>
            <p style="margin:0; font-style:italic;">Nơi đam mê rực cháy</p>
        </div>
        <button onclick="openAlbumModal()" style="padding:10px; background:#27ae60; color:white; border:none; border-radius:5px;">+ Album</button>
    </div>

    <div id="main-content" class="content-area">
        <div class="album-grid" id="albumContainer">
            </div>
    </div>

    <div id="thanh-vien-page" class="content-area" style="display:none;">
        <h2>DANH SÁCH THÀNH VIÊN</h2>
        <button onclick="goBackHome()">Quay lại</button>
        <div id="memberGrid" class="album-grid"></div>
    </div>

    <div id="modalAlbumDetail" class="modal">
        <div class="modal-content">
            <span onclick="closeDetail()" style="float:right; cursor:pointer; font-size:25px;">&times;</span>
            <h2 id="detailTitle">Tên Album</h2>
            <div id="photoGrid" style="display:grid; grid-template-columns:repeat(3, 1fr); gap:10px;"></div>
        </div>
    </div>

    <div id="photoViewer" onclick="this.style.display='none'"><img id="fullPhoto" src=""></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // 1. Cấu hình Firebase (Dùng đúng thông tin bạn đã gửi)
        const firebaseConfig = {
            apiKey: "AIzaSyB61v8FCk4pUVWY61W-35OBk_7mgEQWsBA",
            authDomain: "fc-hgf.firebaseapp.com",
            databaseURL: "https://fc-hgf-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "fc-hgf",
            storageBucket: "fc-hgf.firebasestorage.app",
            messagingSenderId: "1057951855896",
            appId: "1:1057951855896:web:6a50e64266f8ebaf339a6d"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 2. Hàm Menu
        function toggleMenu() { document.getElementById('sideMenu').classList.toggle('active'); }
        function goBackHome() { 
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('thanh-vien-page').style.display = 'none';
            toggleMenu();
        }
        function showTab(tab) {
            if(tab === 'thanh-vien') {
                document.getElementById('main-content').style.display = 'none';
                document.getElementById('thanh-vien-page').style.display = 'block';
            }
            toggleMenu();
        }

        // 3. Lắng nghe Album từ Firebase
        database.ref('albums').on('value', (s) => {
            const data = s.val();
            const container = document.getElementById('albumContainer');
            if(!data) { container.innerHTML = "Trống"; return; }
            const list = Object.keys(data).map(k => ({ id: k, ...data[k] }));
            container.innerHTML = list.map(a => `
                <div class="album-card" onclick="openAlbum('${a.id}', '${a.title}')">
                    <img src="${a.img}" class="album-preview">
                    <div style="padding:15px;"><h3>${a.title}</h3><p>${a.date || ''}</p></div>
                </div>
            `).reverse().join('');
        });

        // 4. Mở chi tiết Album
        function openAlbum(id, title) {
            document.getElementById('detailTitle').innerText = title;
            const grid = document.getElementById('photoGrid');
            grid.innerHTML = "Đang tải...";
            document.getElementById('modalAlbumDetail').style.display = 'block';
            
            // Lấy ảnh của album này
            database.ref('albums/' + id + '/photos').on('value', (s) => {
                const photos = s.val();
                if(!photos) { grid.innerHTML = "Chưa có ảnh chi tiết."; return; }
                const photoList = Object.values(photos);
                grid.innerHTML = photoList.map(p => `<img src="${p}" style="width:100%; height:100px; object-fit:cover; cursor:pointer;" onclick="viewPhoto('${p}')">`).join('');
            });
        }

        function viewPhoto(src) {
            document.getElementById('fullPhoto').src = src;
            document.getElementById('photoViewer').style.display = 'flex';
        }

        function closeDetail() { document.getElementById('modalAlbumDetail').style.display = 'none'; }
    </script>
</body>
</html>
